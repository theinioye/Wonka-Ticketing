services:
  postgres:
    image: postgres:13
    container_name: wonka_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wonkadb
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists data even when the container is stopped

volumes:
  postgres_data: # Creates a named volume to persist the data
